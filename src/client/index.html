<!DOCTYPE html>
<html>
<head>
  <title>Incident Response Manager</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Initialize ServiceNow globals -->
  <sdk:now-ux-globals></sdk:now-ux-globals>
</head>
<body>
  <div id="root"></div>
  
  <!-- Entry point for Rollup bundler - will be transformed during build -->
  <script type="module">
    // This block will be bundled with dependencies by servicenowFrontEndPlugins
    import React from 'react';
    import ReactDOM from 'react-dom/client';
    import App from './app.jsx';

    function initializeApp() {
      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(
          React.createElement(
            React.StrictMode,
            null,
            React.createElement(App)
          )
        );
      }
    }

    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeApp);
    } else {
      initializeApp();
    }
  </script>
</body>
</html>
